name: CI

on:
  push:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Test coverage
        run: pnpm test:coverage

      - name: Lint
        run: pnpm lint
